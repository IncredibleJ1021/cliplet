name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Test
        run: swift test

      - name: Package app
        run: VERSION="${GITHUB_REF_NAME#v}" ./scripts/package_app.sh

      - name: Archive app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Clip.app "Clip-macOS-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/Clip-macOS-${GITHUB_REF_NAME}.zip" \
            --title "Clip ${GITHUB_REF_NAME}" \
            --generate-notes
